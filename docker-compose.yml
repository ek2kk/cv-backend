services:
  cv-rag:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - hf-cache:/home/app/.cache/huggingface
    networks:
      - cv-rag-network
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

networks:
  cv-rag-network:
    driver: bridge

volumes:
  hf-cache:
