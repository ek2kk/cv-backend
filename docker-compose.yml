services:
  cv-rag:
    build:
      context: ./cv-rag
      dockerfile: Dockerfile
    ports:
      - "${CV_RAG_PORT:-8000}:8000"
    restart: unless-stopped
    networks:
      - cv-rag-network
    volumes:
      - hf-cache:/home/app/.cache/huggingface
    env_file:
      - ./cv-rag/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

networks:
  cv-rag-network:
    driver: bridge

volumes:
  hf-cache:
